        - HighWindEvent
        - HeavyRainEvent
        - DebrisFlowEvent
        - DenseSmokeEvent
        - TropicalDepressionEvent
        - LandslideEvent
        - DustDevilEvent
        - WinterStormEvent
        - MarineHailEvent
        - TsunamiEvent
        - BlizzardEvent
        - RipCurrentEvent
        - HeavySnowEvent
        - ExtremeColdWindChillEvent
        - MarineDenseFogEvent
        - TropicalStormEvent
        - StormSurgeTideEvent
        - NorthernLightsEvent
        - FrostFreezeEvent
        - WildfireEvent
        - SleetEvent
        - ColdWindChillEvent
        - MarineStrongWindEvent
        - LightningEvent
        - SneakerwaveEvent
        - AstronomicalLowTideEvent
        - MarineTropicalStormEvent
        - VolcanicAshEvent
        - CoastalFloodEvent
        - GeoCoordinates
        - HeavyWindEvent
