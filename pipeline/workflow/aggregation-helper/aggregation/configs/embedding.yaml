calculations:
  # Generates node embeddings in Spanner
  - name: "Global: Node Embeddings Generation"
    type: EMBEDDING_GENERATION
    stage: 1
    input_imports:
      - "*"
    embedding_generation:
      specs:
        - embedding_label: "base_text_embedding"
          model_name: "NodeEmbeddingModel"
          model_endpoint: "text-embedding-005"
          task_type: "RETRIEVAL_QUERY"
          node_types:
            - "StatisticalVariable"
            - "Topic"
          node_filter_type: "NoFilter"
        - embedding_label: "nl_stat_var_embedding"
          model_name: "NodeEmbeddingModel"
          model_endpoint: "text-embedding-005"
          task_type: "RETRIEVAL_QUERY"
          node_types:
            - "StatisticalVariable"
          node_filter_type: "NLStatisticalVariable"
